# Render Blueprint — deploy API + Worker + Admin + Redis + Postgres
services:
  # ── API Service ─────────────────────────────────────
  - type: web
    name: openclaw-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerTarget: api
    plan: starter
    region: oregon
    preDeployCommand: npx prisma migrate deploy --schema=prisma/schema.prisma
    envVars: &api-env
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: openclaw-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: openclaw-redis
          type: redis
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: INBOUND_EMAIL_WEBHOOK_SECRET
        generateValue: true
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: GHL_API_BASE_URL
        value: https://rest.gohighlevel.com/v1
      - key: GHL_API_TOKEN
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_SHEETS_BOOKKEEPING_SPREADSHEET_ID
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: ADMIN_APP_URL
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: WORKER_CONCURRENCY
        value: "5"
    healthCheckPath: /health

  # ── Worker Service (background job processing) ─────
  - type: worker
    name: openclaw-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerTarget: worker
    plan: starter
    region: oregon
    envVars: *api-env

  # ── Admin Static Site ───────────────────────────────
  - type: web
    name: openclaw-admin
    runtime: static
    buildCommand: npm ci && npm run build -w packages/shared && npm run build -w apps/admin
    staticPublishPath: apps/admin/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Redis ───────────────────────────────────────────
  - type: redis
    name: openclaw-redis
    plan: starter
    maxmemoryPolicy: noeviction

databases:
  - name: openclaw-db
    plan: starter
    postgresMajorVersion: 16
