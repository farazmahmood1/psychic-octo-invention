version: '3.9'

services:
  api:
    build:
      context: .
      target: builder
    ports:
      - '4000:4000'
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    command: npx tsx watch apps/api/src/server.ts
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:4000/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: .
      target: builder
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    command: npx tsx watch apps/api/src/worker.ts
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    ports:
      - '5173:5173'
    volumes:
      - ./apps/admin:/app/apps/admin
    working_dir: /app
    command: npx vite --host 0.0.0.0 apps/admin

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis_data:
